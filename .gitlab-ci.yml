# GitLab Pages — Auto deploy on push to main
# Live URL: https://internal-team8622216.gitlab.io/project-handbook

image: alpine:latest

stages:
  - deploy

pages:
  stage: deploy
  script:
    - echo "Building static site..."
    - mkdir -p public
    - cp index.html public/
    - cp -r assets public/
    - echo "Build complete. Files in public/:"
    - ls -la public/
  artifacts:
    paths:
      - public
    expire_in: 1 week
  only:
    - main
